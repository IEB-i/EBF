<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EBF 2026</title>
    <link rel="shortcut icon" href="./assets/3.ico" type="image/x-icon">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap">
    <style>
        body {
            /* background-image: url('./assets/EBF-cima.png'); */
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            font-family: 'Montserrat', sans-serif;
            color: #333;
            padding-top: 100px;
        }

        .container {
            max-width: 800px;
            margin-top: 20px;
            background-color: rgba(255, 255, 255, 0.9);
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        .header {
            background: linear-gradient(to right, #FFA500, #800080, #1ac43f);
            padding: 10px;
            text-align: center;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .header img {
            max-width: 150px;
        }

        .btn-primary.orange {
            background-color: #FFA500;
            border-color: #FFA500;
            margin-top: 10px;
        }

        .btn-primary.orange:hover {
            background-color: #FF8C00;
            border-color: #FF8C00;
        }

        .btn-primary.purple {
            background-color: #800080;
            border-color: #800080;
            margin-top: 10px;
        }

        .btn-primary.purple:hover {
            background-color: #9400D3;
            border-color: #9400D3;
        }

        .bullet {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 5px;
            vertical-align: middle;
        }

        .orange-bullet {
            background-color: #FFA500;
        }

        .purple-bullet {
            background-color: #800080;
        }

        .btn-gestao {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: white;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: rgba(255, 255, 255, 0.2);
            transition: background-color 0.3s;
        }

        .btn-gestao:hover {
            background-color: rgba(255, 255, 255, 0.4);
            color: white;
            text-decoration: none;
        }
    </style>
</head>

<body>
    <div class="header">
        <img src="./assets/LogoBranco.png" alt="Logo da EBF 2026">
        <a href="pages/login.html" class="btn-gestao" title="Login">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 16 16">
                <path d="M9.405 1.05c-.413-1.4-2.397-1.4-2.81 0l-.1.34a1.464 1.464 0 0 1-2.105.872l-.31-.17c-1.283-.698-2.686.705-1.987 1.987l.169.311c.446.82.023 1.841-.872 2.105l-.34.1c-1.4.413-1.4 2.397 0 2.81l.34.1a1.464 1.464 0 0 1 .872 2.105l-.17.31c-.698 1.283.705 2.686 1.987 1.987l.311-.169a1.464 1.464 0 0 1 2.105.872l.1.34c.413 1.4 2.397 1.4 2.81 0l.1-.34a1.464 1.464 0 0 1 2.105-.872l.31.17c1.283.698 2.686-.705 1.987-1.987l-.169-.311a1.464 1.464 0 0 1 .872-2.105l.34-.1c1.4-.413 1.4-2.397 0-2.81l-.34-.1a1.464 1.464 0 0 1-.872-2.105l.17-.31c.698-1.283-.705-2.686-1.987-1.987l-.311.169a1.464 1.464 0 0 1-2.105-.872zM8 10.93a2.929 2.929 0 1 1 0-5.86 2.929 2.929 0 0 1 0 5.858z"/>
            </svg>
        </a>
    </div>
    <div class="container">
        <h1 class="text-center mb-4">Bem-vindo à EBF 2026</h1>
        <div class="row">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title font-weight-bold"><span class="bullet orange-bullet"></span> Inscrição de
                            Crianças</h5>
                        <p class="card-text">Inscreva seu(s) filho(s) para participar da EBF 2026.</p>
                        <a href="frminscricaoEBF.html" class="btn btn-primary orange">Inscrever Criança</a>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title font-weight-bold"><span class="bullet purple-bullet"></span> Inscrição
                            para Voluntários</h5>
                        <p class="card-text">Inscreva-se como voluntário para ajudar na EBF 2026.</p>
                        <a href="frmVoluntarios.html" class="btn btn-primary purple">Inscrever Voluntário</a>
                    </div>
                </div>
            </div>
        </div>
        <div class="text-center mt-4">
            <img src="./assets/logoEBF.jpeg" alt="Logo EBF 2026" class="img-fluid" style="width: 30%;">
        </div>
    </div>
</body>

</html>
